<script>
const questions = [
  {
    section: "SECTION 01 В· Why Logistic Regression?",
    q: "Why can't we use Linear Regression for binary classification?",
    hint: "Think about what range of values linear regression can produce",
    formula: null,
    options: [
      "A) Linear regression is too slow for classification",
      "B) Linear regression outputs values outside [0,1], making probability interpretation invalid",
      "C) Linear regression requires too many features",
      "D) Linear regression can't handle categorical inputs"
    ],
    answer: 1,
    exp: "Linear regression predicts values from в€’в€ћ to +в€ћ. For classification we need probabilities between 0 and 1. Predicting P(y=1|x)=1.5 or P(y=1|x)=в€’0.3 is nonsensical. Also, outliers drag the decision boundary badly. Logistic regression solves both by applying the sigmoid function to squash output into (0,1)."
  },
  {
    section: null,
    q: "Which problem BEST illustrates why linear regression fails at classification?",
    hint: "Think of extreme outlier effects",
    formula: null,
    options: [
      "A) A new point far from the boundary doesn't affect the linear model",
      "B) Adding a very extreme positive example shifts the linear regression line, misclassifying nearby positive examples",
      "C) Linear regression cannot compute a slope for binary data",
      "D) Linear regression outputs always equal 0.5 for balanced datasets"
    ],
    answer: 1,
    exp: "Classic failure: if you fit a linear regression line to tumor size vs malignancy (0/1), adding a new large tumor far to the right shifts the entire line, potentially misclassifying medium-sized tumors that were previously correct. The boundary is distorted by extreme points. Logistic regression's sigmoid is robust to this."
  },
  {
    section: "SECTION 02 В· The Sigmoid Function",
    q: "What is the sigmoid function formula and what range does it map to?",
    formula: "Пѓ(z) = ??? where z = wВ·x + b",
    options: [
      "A) Пѓ(z) = zВІ, maps to [0, в€ћ)",
      "B) Пѓ(z) = 1/(1+e^(в€’z)), maps to (0, 1)",
      "C) Пѓ(z) = max(0,z), maps to [0, в€ћ)",
      "D) Пѓ(z) = tanh(z), maps to (в€’1, 1)"
    ],
    answer: 1,
    exp: "Sigmoid: Пѓ(z) = 1/(1+e^{в€’z}). At z=0: Пѓ=0.5. As zв†’+в€ћ: Пѓв†’1. As zв†’в€’в€ћ: Пѓв†’0. The output is always in (0,1) вЂ” never exactly 0 or 1 вЂ” making it a valid probability. 'Logistic' function and 'sigmoid' are used interchangeably in this context."
  },
  {
    section: null,
    q: "Calculate Пѓ(0). What does this value intuitively mean?",
    formula: "Пѓ(z) = 1 / (1 + e^(в€’z))\nCompute: Пѓ(0) = 1 / (1 + e^0) = 1 / (1 + 1) = ?",
    options: [
      "A) 0 вЂ” model predicts negative class with certainty",
      "B) 1 вЂ” model predicts positive class with certainty",
      "C) 0.5 вЂ” maximum uncertainty, both classes equally likely",
      "D) 0.5 вЂ” always predict positive class"
    ],
    answer: 2,
    exp: "Пѓ(0) = 1/(1+1) = 0.5. When the linear combination z = wВ·x+b = 0, the model is completely undecided вЂ” 50% chance for either class. This is the decision boundary point! We switch from predicting 0 to predicting 1 exactly here. The boundary is the hyperplane wВ·x+b = 0."
  },
  {
    section: null,
    q: "Calculate Пѓ(2). (Use: e^(в€’2) в‰€ 0.135)",
    formula: "Пѓ(2) = 1 / (1 + e^(в€’2))\n       = 1 / (1 + 0.135)\n       = 1 / 1.135 = ?",
    options: [
      "A) в‰€ 0.50",
      "B) в‰€ 0.73",
      "C) в‰€ 0.88",
      "D) в‰€ 0.99"
    ],
    answer: 2,
    exp: "Пѓ(2) = 1/1.135 в‰€ 0.881. The model predicts 88% probability for class 1 when z=2. Symmetry: Пѓ(в€’2) = 1 в€’ 0.881 = 0.119. As z increases, probability climbs toward 1. The sigmoid is symmetric around (0, 0.5)."
  },
  {
    section: null,
    q: "What is the derivative of Пѓ(z)?",
    hint: "This elegant formula appears in backpropagation",
    formula: "dПѓ/dz = ?",
    options: [
      "A) dПѓ/dz = Пѓ(z)",
      "B) dПѓ/dz = 1 в€’ Пѓ(z)",
      "C) dПѓ/dz = Пѓ(z) В· (1 в€’ Пѓ(z))",
      "D) dПѓ/dz = Пѓ(z)ВІ"
    ],
    answer: 2,
    exp: "dПѓ/dz = Пѓ(z)В·(1в€’Пѓ(z)). Proof: let s=Пѓ(z)=1/(1+e^{в€’z}). Then ds/dz = e^{в€’z}/(1+e^{в€’z})ВІ = [1/(1+e^{в€’z})]В·[e^{в€’z}/(1+e^{в€’z})] = sВ·(1в€’s). At z=0: derivative = 0.5Г—0.5 = 0.25 (maximum). At extremes: derivative в†’ 0 (vanishing gradient problem)."
  },
  {
    section: null,
    q: "The logit function is the INVERSE of sigmoid. Compute logit(0.731). (ln(2.717) в‰€ 1.0)",
    formula: "logit(p) = ln( p / (1в€’p) )\nlogit(0.731) = ln( 0.731 / 0.269 ) = ln(2.717) = ?",
    options: [
      "A) в‰€ 0",
      "B) в‰€ 1",
      "C) в‰€ 2",
      "D) в‰€ 3"
    ],
    answer: 1,
    exp: "logit(0.731) = ln(0.731/0.269) = ln(2.717) в‰€ 1.0. This confirms Пѓ(1) в‰€ 0.731. The logit (log-odds) is what logistic regression models as a linear function of features: log(P/(1в€’P)) = wВ·x+b. It transforms probability [0,1] в†’ (в€’в€ћ, +в€ћ), the reverse of sigmoid."
  },
  {
    section: "SECTION 03 В· Calculations with Logistic Regression",
    q: "Given w=[2, 0.5], b=в€’10, and x=[3, 7] (study hours, sleep hours), what is z and the predicted pass probability?",
    formula: "z = wв‚Ѓxв‚Ѓ + wв‚‚xв‚‚ + b\n  = 2(3) + 0.5(7) + (в€’10)\n  = 6 + 3.5 в€’ 10 = ?\nThen Пѓ(z) = 1/(1+e^(в€’z))\nIf z=в€’0.5: e^0.5 в‰€ 1.649",
    options: [
      "A) z=2.5, Pв‰€0.92",
      "B) z=в€’0.5, Pв‰€0.38",
      "C) z=3.5, Pв‰€0.97",
      "D) z=1.0, Pв‰€0.73"
    ],
    answer: 1,
    exp: "z = 2Г—3 + 0.5Г—7 + (в€’10) = 6 + 3.5 в€’ 10 = в€’0.5. Пѓ(в€’0.5) = 1/(1+e^{0.5}) = 1/(1+1.649) = 1/2.649 в‰€ 0.378. So 37.8% chance of passing вЂ” model predicts FAIL. The negative z means we're below the decision boundary. Need more study hours or sleep for the prediction to flip."
  },
  {
    section: null,
    q: "For the above model, what value of study hours xв‚Ѓ exactly hits the decision boundary (z=0), keeping sleep=7?",
    formula: "Set z = 2xв‚Ѓ + 0.5(7) в€’ 10 = 0\n2xв‚Ѓ + 3.5 в€’ 10 = 0\n2xв‚Ѓ = 6.5\nxв‚Ѓ = ?",
    options: [
      "A) xв‚Ѓ = 2.5 hours",
      "B) xв‚Ѓ = 3.25 hours",
      "C) xв‚Ѓ = 4.0 hours",
      "D) xв‚Ѓ = 5.0 hours"
    ],
    answer: 1,
    exp: "2xв‚Ѓ + 3.5 в€’ 10 = 0 в†’ 2xв‚Ѓ = 6.5 в†’ xв‚Ѓ = 3.25 hours. At exactly 3.25 hours of study (with 7 hours sleep), the model is 50/50 uncertain. More than 3.25 hours в†’ predicts pass. Less в†’ predicts fail. This is how you read a logistic regression decision boundary."
  },
  {
    section: "SECTION 04 В· Loss Functions",
    q: "Why don't we use Mean Squared Error (MSE) with logistic regression?",
    formula: "MSE + sigmoid = non-convex loss landscape",
    options: [

      "C) MSE always equals zero for binary data",

    ],
    answer: 1,
    exp: "Composing MSE (Е·в€’y)ВІ with sigmoid creates a non-convex loss surface with multiple local minima. Gradient descent may converge to a suboptimal solution. Binary Cross-Entropy is mathematically derived to be convex when paired with sigmoid вЂ” any local minimum is THE global minimum. This is why BCE is the correct and standard choice for logistic regression."
  },
  {
    section: null,
    q: "What is the Binary Cross-Entropy (Log Loss) formula for a single sample?",
    formula: "L = ???",
    options: [
      "A) L = (Е· в€’ y)ВІ",
      "B) L = в€’[yВ·log(Е·) + (1в€’y)В·log(1в€’Е·)]",

      "D) L = Е· В· log(y)"

    answer: 1,
    exp: "BCE: L = в€’[yВ·log(Е·) + (1в€’y)В·log(1в€’Е·)]. When y=1: L = в€’log(Е·). Good prediction (Е·в‰€1) в†’ small loss. Wrong prediction (Е·в‰€0) в†’ Lв†’в€ћ. When y=0: L = в€’log(1в€’Е·). Good prediction (Е·в‰€0) в†’ small loss. Wrong prediction (Е·в‰€1) в†’ Lв†’в€ћ. Crucially, confident WRONG predictions are penalized extremely heavily."
  },
  {
    section: null,
    q: "Calculate BCE loss: true label y=1, predicted probability Е·=0.9. Use log(0.9)в‰€в€’0.105.",
    formula: "L = в€’[yВ·log(Е·) + (1в€’y)В·log(1в€’Е·)]\n  = в€’[1В·log(0.9) + 0В·log(0.1)]\n  = в€’log(0.9) в‰€ ?",
    options: [
      "A) L в‰€ 0.105 (small вЂ” good prediction)",
      "B) L в‰€ 2.303 (large вЂ” bad prediction)",
      "C) L = (1в€’0.9)ВІ = 0.01",

    ],
    answer: 0,
    exp: "L = в€’log(0.9) в‰€ 0.105. Small loss because prediction (90%) is close to truth (100%). Compare: if Е·=0.1 (very wrong), L = в€’log(0.1) в‰€ 2.303 вЂ” 22Г— larger penalty. The log function grows steeply as predictions move away from truth, strongly incentivizing confident correct predictions."
  },
  {
    section: null,
    q: "Calculate BCE loss: true label y=0, predicted Е·=0.8 (wrong confident prediction). Use log(0.2)в‰€в€’1.609.",
    formula: "L = в€’[yВ·log(Е·) + (1в€’y)В·log(1в€’Е·)]\n  = в€’[0В·log(0.8) + 1В·log(1в€’0.8)]\n  = в€’log(0.2) в‰€ ?",

      "C) L = 0.64",

let answered = 0;
let correct = 0;
const userAnswers = {};

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  let currentSection = null;

  questions.forEach((q, i) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      const sl = document.createElement('div');
      sl.className = 'section-label';
      sl.innerHTML = `<div class="dot"></div><span>${q.section}</span><div class="line"></div>`;
      container.appendChild(sl);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;
    card.style.animationDelay = `${i * 0.025}s`;

    const formulaHtml = q.formula
      ? `<div class="formula">${q.formula}</div>` : '';
    const hintHtml = q.hint
      ? `<div class="hint">${q.hint}</div>` : '';

    const optionsHtml = q.options.map((opt, j) => {
      return `<button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">
        <span>${opt}</span>
      </button>`;
    }).join('');

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${String(i+1).padStart(2,'0')}</span>
        <span class="q-text">${q.q}</span>
      </div>
      ${formulaHtml}
      ${hintHtml}
      <div class="options">${optionsHtml}</div>
      <div class="explanation" id="exp-${i}">
        <div class="exp-title">Explanation</div>
        <div id="exp-text-${i}"></div>
      </div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (userAnswers[qIdx] !== undefined) return;
  userAnswers[qIdx] = optIdx;
  answered++;

  const q = questions[qIdx];
  const isCorrect = optIdx === q.answer;
  if (isCorrect) correct++;

  const card = document.getElementById(`card-${qIdx}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  q.options.forEach((opt, j) => {
    const btn = document.getElementById(`opt-${qIdx}-${j}`);
    btn.disabled = true;
    if (j === q.answer) {
      btn.classList.add('correct');
      btn.innerHTML = `<span>${opt}</span><span class="result-icon">вњ“</span>`;
    } else if (j === optIdx && !isCorrect) {
      btn.classList.add('wrong');
      btn.innerHTML = `<span>${opt}</span><span class="result-icon">вњ—</span>`;
    }
  });

  const expDiv = document.getElementById(`exp-${qIdx}`);
  document.getElementById(`exp-text-${qIdx}`).textContent = q.exp;
  expDiv.classList.add('show');

  updateProgress();
  if (answered === questions.length) setTimeout(showResults, 800);
}

function updateProgress() {
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${questions.length}`;
  document.getElementById('scoreBadge').textContent = `Score: ${correct}`;
}

function showResults() {
  const pct = Math.round((correct / questions.length) * 100);
  let grade, msg, color;
  if (pct >= 90) { grade = 'рџЏ† Outstanding!'; msg = 'Exceptional mastery of logistic regression. Ready for advanced ML!'; color = 'var(--accent3)'; }
  else if (pct >= 75) { grade = 'рџҐ€ Great Job!'; msg = 'Strong grasp of concepts. Review the sections you missed.'; color = 'var(--accent)'; }
  else if (pct >= 60) { grade = 'рџЋЇ Good Effort!'; msg = 'Solid foundation. Revisit calculations and multinomial methods.'; color = 'var(--warn)'; }
  else { grade = 'рџ“љ Keep Studying!'; msg = 'Review sigmoid, loss functions, and the OvR/OvO strategies.'; color = 'var(--danger)'; }

  const res = document.getElementById('finalResults');
  res.innerHTML = `
    <h2>Quiz Complete!</h2>
    <div class="score-circle" style="border-color:${color};box-shadow:0 0 30px ${color}33">
      <div class="big-num" style="color:${color}">${pct}%</div>
      <div class="sub">${correct}/${questions.length}</div>
    </div>
    <div class="grade-text" style="color:${color}">${grade}</div>
    <div class="grade-msg">${msg}</div>
    <div class="stats-row">
      <div class="stat-box"><div class="s-val" style="color:var(--correct)">${correct}</div><div class="s-lab">Correct</div></div>
      <div class="stat-box"><div class="s-val" style="color:var(--wrong)">${questions.length-correct}</div><div class="s-lab">Wrong</div></div>
      <div class="stat-box"><div class="s-val" style="color:var(--accent)">${pct}%</div><div class="s-lab">Score</div></div>
    </div>
    <button class="reset-btn" onclick="resetQuiz()">в†є Retake Quiz</button>
  `;
  res.classList.add('show');
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetQuiz() {
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  answered = 0; correct = 0;
  document.getElementById('finalResults').classList.remove('show');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = `0 / ${questions.length}`;
  document.getElementById('scoreBadge').textContent = 'Score: 0';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
document.getElementById('progressText').textContent = `0 / ${questions.length}`;
</script>
</body>
</html>
